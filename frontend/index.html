<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOICE XTB 9.0 STRUCTURE ENGINE</title>

<style>
:root{
    --bg-color:#121212;
    --card-bg:#1e1e1e;
    --text-color:#e0e0e0;
    --accent-color:#ffd166;

    /* JASKRAWE KOLORY WIERSZY */
    --buy-color:#00ff88;
    --hold-color:#00cfff;
    --reduce-color:#ffb347;
    --sell-color:#ff3b5c;
    --wait-color:#8d99ae;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-color);
    color:var(--text-color);
    margin:0;
    padding:15px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

h1{
    color:var(--accent-color);
}

.voice-panel{
    background:var(--card-bg);
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}

.btn{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

.btn-start{
    background:#00ff88;
    color:#000;
    box-shadow:0 0 14px rgba(0,255,136,.55);
}

.btn-stop{
    background:#ff3b5c;
    color:#fff;
    box-shadow:0 0 14px rgba(255,59,92,.45);
}

#recognized{
    margin-top:10px;
    color:#ffd166;
}

#comment{
    margin-top:5px;
    font-weight:bold;
    white-space: pre-line;
    line-height: 1.4;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 6px;
    border-left: 3px solid var(--accent-color);
}

.table-container{
    overflow-x:auto;
    background:var(--card-bg);
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #333;
    text-align:center;
    transition:all .18s ease;
}

th{
    background:#252525;
    color:#ffd166;
}

/* =========================================
   JASKRAWE PEŁNE WIERSZE
========================================= */
.row-buy{
    background:linear-gradient(90deg, rgba(0,255,136,.45), rgba(0,255,136,.22)) !important;
}
.row-buy td{
    color:#ffffff;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.12);
}
.row-buy:hover{
    background:linear-gradient(90deg, rgba(0,255,136,.60), rgba(0,255,136,.35)) !important;
}

.row-hold{
    background:linear-gradient(90deg, rgba(0,207,255,.40), rgba(0,207,255,.20)) !important;
}
.row-hold td{
    color:#ffffff;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.10);
}
.row-hold:hover{
    background:linear-gradient(90deg, rgba(0,207,255,.55), rgba(0,207,255,.30)) !important;
}

.row-reduce{
    background:linear-gradient(90deg, rgba(255,179,71,.40), rgba(255,179,71,.20)) !important;
}
.row-reduce td{
    color:#ffffff;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.10);
}
.row-reduce:hover{
    background:linear-gradient(90deg, rgba(255,179,71,.55), rgba(255,179,71,.30)) !important;
}

.row-sell{
    background:linear-gradient(90deg, rgba(255,59,92,.45), rgba(255,59,92,.22)) !important;
}
.row-sell td{
    color:#ffffff;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.12);
}
.row-sell:hover{
    background:linear-gradient(90deg, rgba(255,59,92,.60), rgba(255,59,92,.35)) !important;
}

.row-wait{
    background:rgba(255,255,255,.02);
}

.ticker-cell{
    font-weight:bold;
    cursor:pointer;
    color:#2196F3 !important;
    text-decoration: underline dotted #2196F3;
}

.price-cell{
    font-weight:bold;
    font-family:monospace;
    font-size:15px;
}

.entry-cell{
    color:#ffd166;
    font-family:monospace;
    cursor:pointer;
    font-weight:bold;
    text-decoration: underline dashed #ffd166;
}

.signal-box{
    display:inline-block;
    padding:7px 12px;
    border-radius:8px;
    background:rgba(0,0,0,.40);
    border:1px solid rgba(255,255,255,.12);
    font-weight:800;
    min-width:105px;
    letter-spacing:.3px;
    backdrop-filter:blur(4px);
}

.delete-cell{
    cursor:pointer;
    font-size:18px;
    user-select: none;
}

.popup-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.80);
    z-index:999;
}

.modal{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:92%;
    max-width:680px;
    z-index:1000;
    max-height:85vh;
    overflow-y:auto;
}

.modal-content{
    background:#1e1e1e;
    padding:25px;
    border-radius:12px;
    border:1px solid #ffd166;
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    position: relative;
}

.close-btn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:28px;
    cursor:pointer;
    color:#aaa;
}

.close-btn:hover{
    color:#fff;
}

/* =========================================
   ROZBUDOWANY RAPORT MODALNY
========================================= */
.report-html{
    font-family:system-ui,-apple-system,sans-serif;
    line-height:1.6;
}
.report-html p {
    margin: 8px 0;
}
.report-html ul {
    margin: 5px 0;
    padding-left: 20px;
}
.report-html li {
    margin-bottom: 4px;
}
.report-html .verdict-line {
    font-size: 1.2rem;
    background: rgba(0,255,136,0.1);
    padding: 8px;
    border-radius: 6px;
    border-left: 4px solid #00ff88;
    margin-bottom: 15px;
}
.report-html .section-title {
    color: var(--accent-color);
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: bold;
    border-bottom: 1px dashed #444;
    padding-bottom: 3px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>VOICE XTB 9.0 STRUCTURE</h1>
<div>GPW STRUKTURA WIELO-INTERWAŁOWA — SYSTEM KONSENSUSU</div>
</header>

<div class="voice-panel">
<button class="btn btn-start" onclick="startSequence()">🎙️ START</button>
<button class="btn btn-stop" onclick="stopSequence()">⛔ STOP</button>

<div id="recognized">Oczekiwanie na mikrofon...</div>
<div id="comment">System gotowy do pracy</div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Ticker 📋</th>
<th>Cena</th>
<th>TF</th>
<th>Entry ✏️</th>
<th>Sygnał</th>
<th>Widełki</th>
<th>TP1</th>
<th>TP2</th>
<th>TP3</th>
<th>Trailing SL 🛑</th>
<th>Usuń</th>
</tr>
</thead>
<tbody id="table-body">
<tr>
<td colspan="11">Oczekiwanie na dane ze struktury...</td>
</tr>
</tbody>
</table>
</div>

<div id="parsed" style="margin-top:15px;font-family:monospace;color:#555;font-size:11px;word-break:break-all;"></div>
</div>

<div id="popupOverlay" class="popup-overlay" onclick="closeModal()"></div>
<div id="popup" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<h3 style="color:#ffd166; margin-top:0; border-bottom:2px solid #ffd166; padding-bottom:8px;">
📊 DYNAMICZNY RAPORT STRUKTURALNY SYGNAŁU
</h3>
<div id="popupBody"></div>
</div>
</div>

<script>
function closeModal(){
    document.getElementById("popup").style.display="none";
    document.getElementById("popupOverlay").style.display="none";
}

const backend = "https://voice-xtb.onrender.com/voice-parse";
const STORAGE_KEY = "xtbtablememoryv4structure";

let recognition = null;
let recognizing = false;
let currentStep = 0;
let tempRecord = {};
let isFetching = false;

const tickers = {};

const steps = [
"Podaj ticker",
"Podaj interwał",
"Podaj czas lub dzień",
"Podaj cenę open",
"Podaj cenę high",
"Podaj cenę low",
"Podaj cenę close",
"Podaj wolumen",
"Podaj MA 20",
"Podaj DEMA 9",
"Podaj RSI"
];

// ======================================================
// SPEECH INIT
// ======================================================
function initRecognition(){
    const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
    if(!SR) return null;

    const rec = new SR();
    rec.lang = "pl-PL";
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e)=>{
        const text = e.results[0][0].transcript.trim();
        document.getElementById("recognized").textContent = `Rozpoznano: ${text}`;
        handleRecognized(text);
    };

    rec.onend = ()=>{
        if(recognizing){
            if(currentStep < steps.length){
                setTimeout(()=>{ sayStep(); },250);
            }else{
                recognizing = false;
                finalizeRecord();
            }
        }
    };

    rec.onerror = (e)=>{
        console.log("Speech error:", e.error);
        if(recognizing){
            setTimeout(()=>{
                try{ recognition.start(); }catch(err){}
            },400);
        }
    };
    return rec;
}

recognition = initRecognition();

// ======================================================
// SPEECH OUTPUT
// ======================================================
function sayStep(){
    if(currentStep >= steps.length || !recognizing) return;

    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(steps[currentStep]);
    msg.lang = "pl-PL";
    msg.rate = 1.08;

    msg.onend = ()=>{
        if(recognizing){
            setTimeout(()=>{
                try{
                    recognition.start();
                }catch(err){
                    setTimeout(()=>{ if(recognizing) recognition.start(); },350);
                }
            },180);
        }
    };
    speechSynthesis.speak(msg);
}

// ======================================================
// HELPERS / PARSERS
// ======================================================
function extractNumber(text){
    if(!text) return 0;
    text = text.toString()
    .toLowerCase()
    .replaceAll("kropka",".")
    .replaceAll("przecinek",".")
    .replace(/\s+/g,"");

    const num = parseFloat(text);
    return isFinite(num) ? num : 0;
}

function normalizeInterval(tf){
    tf = tf.toUpperCase().trim();
    if(tf==="5" || tf==="M5") return "M5";
    if(tf==="15" || tf==="M15") return "M15";
    if(tf==="H1" || tf==="1H" || tf==="60") return "H1";
    if(tf==="D1" || tf==="1D" || tf==="D") return "D1";
    return tf;
}

function parseAndAlignTime(rawText, intervalStr){
    const now = new Date();
    if(intervalStr==="D1"){
        return now.toISOString().split("T")[0];
    }

    let h = now.getHours();
    let m = now.getMinutes();
    const clean = rawText.replace(/[^\d]/g,"");

    if(clean.length===4){
        h = parseInt(clean.substring(0,2));
        m = parseInt(clean.substring(2));
    }else if(clean.length===3){
        h = parseInt(clean.substring(0,1));
        m = parseInt(clean.substring(1));
    }

    if(intervalStr==="M5") m=Math.floor(m/5)*5;
    if(intervalStr==="M15") m=Math.floor(m/15)*15;
    if(intervalStr==="H1") m=0;

    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function handleRecognized(text){
    switch(currentStep){
        case 0: tempRecord.ticker = text.toUpperCase().replace(/\s+/g,""); break;
        case 1: tempRecord.interval = normalizeInterval(text); break;
        case 2: tempRecord.time = parseAndAlignTime(text, tempRecord.interval); break;
        case 3: tempRecord.open = extractNumber(text); break;
        case 4: tempRecord.high = extractNumber(text); break;
        case 5: tempRecord.low = extractNumber(text); break;
        case 6: tempRecord.close = extractNumber(text); break;
        case 7: tempRecord.volume = extractNumber(text); break;
        case 8: tempRecord.ma20 = extractNumber(text); break;
        case 9: tempRecord.dema9 = extractNumber(text); break;
        case 10: tempRecord.rsi = extractNumber(text); break;
    }
    currentStep++;
}

// ======================================================
// POPRAWIONY PARSER KOMENTARZA STRUKTURALNEGO DO POPUPU
// ======================================================
function parseEngineCommentToHtml(commentText) {
    if (!commentText) return "Brak szczegółowego komentarza strukturalnego.";
    
    let lines = commentText.split("\n");
    let html = '<div class="report-html">';
    
    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        if (line.startsWith("=== RAPORT SYSTEMU")) return;

        if (line.startsWith("WERDYKT:")) {
            html += `<div class="verdict-line"><strong>${line}</strong></div>`;
            return;
        }
        if (line.startsWith("LOGIKA:")) {
            html += `<p style="font-size: 1.05rem; color: #fff; margin-bottom: 12px;"><strong>Logika operacyjna:</strong> ${line.replace("LOGIKA:", "")}</p>`;
            return;
        }
        if (line.startsWith("DYNAMICZNY DOPALACZ MATEMATYCZNY:") || line.includes("D1:") || line.includes("H1:")) {
            html += `<div class="section-title">${line}</div>`;
            return;
        }
        if (line.startsWith("•") || line.startsWith("-")) {
            html += `<ul><li>${line.substring(1).trim()}</li></ul>`;
            return;
        }
        if (line.startsWith("-----------------------------------------")) {
            html += `<hr style="border:0; border-top: 1px dashed #444; margin:10px 0;">`;
            return;
        }

        html += `<p>${line}</p>`;
    });

    html += '</div>';
    return html;
}

// ======================================================
// FINALIZE RECORD
// ======================================================
async function finalizeRecord(){
    if(isFetching) return;
    isFetching = true;

    document.getElementById("comment").textContent = "⏳ Analiza wielointerwałowa...";
    document.getElementById("parsed").textContent = JSON.stringify(tempRecord);

    const ticker = tempRecord.ticker;
    tempRecord.entry = (tickers[ticker] && tickers[ticker].globalEntry)
        ? parseFloat(tickers[ticker].globalEntry)
        : null;

    try{
        const response = await fetch(`${backend}?t=${Date.now()}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(tempRecord)
        });

        const data = await response.json();
        handleBackendData(data);
        
        if(data.comment) {
            document.getElementById("comment").textContent = data.comment;
        } else {
            document.getElementById("comment").textContent = `✔️ Analiza gotowa. Werdykt: ${data.signal}`;
        }
    }catch(err){
        document.getElementById("comment").textContent = "❌ Błąd połączenia z serwerem";
        console.error(err);
    }

    tempRecord = {};
    currentStep = 0;
    isFetching = false;
}

function handleBackendData(d){
    const ticker = d.ticker;
    const tf = normalizeInterval(d.interval);

    if(!tickers[ticker]){
        tickers[ticker] = {
            globalEntry:"",
            updatedAt:0,
            lastTF: tf
        };
    }

    tickers[ticker].updatedAt = Date.now();
    tickers[ticker].lastTF = tf;

    if(d.entry !== undefined && d.entry !== null && d.entry !== "") {
        tickers[ticker].globalEntry = d.entry.toString();
    }

    if(!tickers[ticker][tf]){
        tickers[ticker][tf] = { history:[] };
    }

    tickers[ticker][tf].last = d;
    updateTable();
}

// ======================================================
// TABLE RENDERING (ZINTEGROWANA Z TRAILING SL)
// ======================================================
function updateTable(){
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    const sorted = Object.keys(tickers).sort((a,b)=> tickers[b].updatedAt - tickers[a].updatedAt);

    if(sorted.length===0){
        tbody.innerHTML = `<tr><td colspan="11">Oczekiwanie na dane ze struktury...</td></tr>`;
        return;
    }

    sorted.forEach(ticker=>{
        const t = tickers[ticker];
        const tf = t.lastTF || "M5";
        const rec = t[tf]?.last;
        if(!rec) return;

        const row = document.createElement("tr");
        row.className = getRowClass(rec.signal);

        const confidenceStr = rec.confidence !== undefined ? ` (${rec.confidence}%)` : "";

        row.innerHTML = `
        <td class="ticker-cell" style="cursor:pointer;">${ticker} 📋</td>
        <td class="price-cell">${Number(rec.close).toFixed(2)}</td>
        <td>${rec.interval}<br><small>${rec.time}</small></td>
        <td class="entry-cell">${t.globalEntry || "—"}</td>
        <td><div class="signal-box">${rec.signal || "BRAK"}${confidenceStr}</div></td>
        <td>${rec.widelki || "—"}</td>
        <td style="color: #4CAF50; font-weight: bold;">${rec.tp1 || "—"}</td>
        <td style="color: #FF9800; font-weight: bold;">${rec.tp2 || "—"}</td>
        <td style="color: #E91E63; font-weight: bold;">${rec.tp3 || "—"}</td>
        <td class="tsl-cell" style="color: #ff3b5c; font-weight: bold; background: rgba(255,59,92,0.06); border-radius:4px;">${rec.trailing_sl || "—"}</td>
        <td class="delete-cell">🗑️</td>
        `;
        tbody.appendChild(row);
    });
    saveTable();
}

function getRowClass(sig){
    if(!sig) return "row-wait";
    sig = sig.toUpperCase();
    if(sig.includes("BUY")) return "row-buy";
    if(sig.includes("HOLD")) return "row-hold";
    if(sig.includes("REDUKUJ")) return "row-reduce";
    if(sig.includes("SELL")) return "row-sell";
    return "row-wait";
}

function startSequence(){
    if(recognizing) return;
    speechSynthesis.cancel();
    tempRecord = {};
    currentStep = 0;
    recognizing = true;
    sayStep();
}

function stopSequence(){
    recognizing = false;
    currentStep = 0;
    tempRecord = {};
    try{ recognition.stop(); }catch(err){}
    document.getElementById("comment").textContent = "⛔ Zatrzymano";
}

// ======================================================
// MANUAL ENTRY QUICK EDIT
// ======================================================
function manualEditEntry(tickerName) {
    const current = tickers[tickerName]?.globalEntry || "";
    const val = prompt(`Wpisz lub skoryguj cenę wejścia (Entry) dla ${tickerName}:`, current);
    if (val !== null) {
        const num = parseFloat(val.replace(",", "."));
        if (!isNaN(num) && num > 0) {
            tickers[tickerName].globalEntry = num.toFixed(2);
        } else {
            tickers[tickerName].globalEntry = "";
        }
        updateTable();
    }
}

// ======================================================
// EVENTS - KLIKNIĘCIA STRUKTURALNE W TABELI
// ======================================================
document.addEventListener("click", async(e)=>{
    const cell = e.target.closest("td");
    const row = e.target.closest("tr");
    if(!cell || !row) return;

    let rawTicker = row.querySelector(".ticker-cell")?.textContent || "";
    const ticker = rawTicker.replace("📋", "").trim().toUpperCase();

    // AKCJA 1: USUWANIE REKORDÓW Z CHMURY (.TRIM() ZAMIAST WADLIWEGO .STRIP())
    if(cell.classList.contains("delete-cell")){
        delete tickers[ticker];
        updateTable();
        
        const baseEndpoint = backend.replace("/voice-parse", "");
        try{
            await fetch(`${baseEndpoint}/voice-parse/delete`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({ticker: ticker})
            });
        }catch(err){ 
            console.error("Błąd podczas usuwania z chmury:", err); 
        }
        return;
    }

    // AKCJA 2: RĘCZNA EDYCJA CENY ENTRY PO KLIKNIĘCIU W KOMÓRKĘ
    if(cell.classList.contains("entry-cell")){
        manualEditEntry(ticker);
        return;
    }

    // AKCJA 3: RAPORT SZCZEGÓŁOWY (POPU-UP MODALNY)
    if(cell.classList.contains("ticker-cell")){
        const tf = tickers[ticker].lastTF;
        const rec = tickers[ticker][tf]?.last;

        if(rec && rec.comment){
            const formattedHtml = parseEngineCommentToHtml(rec.comment);
            
            document.getElementById("popupBody").innerHTML = formattedHtml;
            document.getElementById("popup").style.display = "block";
            document.getElementById("popupOverlay").style.display = "block";
        }
    }
});

// ======================================================
// LOCAL STORAGE & CLOUD MEMORY SYNC
// ======================================================
function saveTable(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
}

async function loadTable(){
    const baseEndpoint = backend.replace("/voice-parse", "");
    try{
        const response = await fetch(`${baseEndpoint}/memory?t=${Date.now()}`);
        if(response.ok){
            const data = await response.json();
            if(data && Object.keys(data).length > 0){
                for(let member in tickers){ delete tickers[member]; }

                Object.keys(data).forEach(ticker=>{
                    tickers[ticker] = {
                        globalEntry: data[ticker].global_entry || "",
                        updatedAt: Date.now()
                    };

                    ["M5", "M15", "H1", "D1"].forEach(tf=>{
                        if(data[ticker][tf] && data[ticker][tf].last_data && Object.keys(data[ticker][tf].last_data).length > 0){
                            if(!tickers[ticker][tf]){ tickers[ticker][tf] = { history:[] }; }
                            tickers[ticker][tf].last = data[ticker][tf].last_data;
                            tickers[ticker].lastTF = tf;
                        }
                    });
                });
                updateTable();
                return;
            }
        }
    }catch(err){ 
        console.log("Brak odpowiedzi z chmury, ładowanie z localStorage fallback...", err); 
    }

    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
        Object.assign(tickers, JSON.parse(raw));
        updateTable();
    }
}

document.addEventListener("DOMContentLoaded", loadTable);
</script>

</body>
</html>

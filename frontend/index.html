<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOICE XTB 8.1 HYBRID</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ffd166;
            --buy-premium: #06d6a0;
            --buy-normal: #4cc9f0;
            --sell-color: #ef476f;
            --czekaj-color: #8d99ae;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .status-tag {
            font-size: 0.8rem;
            background: #2a2a2a;
            padding: 3px 8px;
            border-radius: 12px;
            color: #06d6a0;
            display: inline-block;
            margin-top: 5px;
        }

        /* Sekcja Kontroli Głosowej */
        .voice-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .btn {
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-start {
            background-color: var(--buy-premium);
            color: #000;
        }

        .btn-stop {
            background-color: var(--sell-color);
            color: #fff;
        }

        #recognized {
            margin-top: 10px;
            font-style: italic;
            color: var(--accent-color);
            min-height: 20px;
        }

        #comment {
            margin-top: 5px;
            font-weight: bold;
            color: #fff;
        }

        /* Tabela Wyników */
        .table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #2d2d2d;
        }

        th {
            background-color: #252525;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* Kolory wierszy na bazie sygnałów */
        .row-buy-premium { background-color: rgba(6, 214, 160, 0.15); }
        .row-buy { background-color: rgba(76, 201, 240, 0.12); }
        .row-sell { background-color: rgba(239, 71, 111, 0.12); }
        .row-czekaj { background-color: transparent; }

        .ticker-cell {
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: underline dotted var(--accent-color);
        }

        .price-cell {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Nowa stylizacja komórki wpisywania ręcznego */
        .entry-cell {
            color: var(--accent-color);
            font-weight: bold;
            font-family: monospace;
            font-size: 1.05rem;
            background-color: rgba(255, 209, 102, 0.05);
            text-align: center;
            transition: background 0.2s;
        }
        
        .entry-cell:hover {
            background-color: rgba(255, 209, 102, 0.15);
        }

        .signal-box {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            background: #2a2a2a;
            border: 1px solid #444;
        }

        .row-buy-premium .signal-box { color: var(--buy-premium); border-color: var(--buy-premium); }
        .row-buy .signal-box { color: var(--buy-normal); border-color: var(--buy-normal); }
        .row-sell .signal-box { color: var(--sell-color); border-color: var(--sell-color); }
        .row-czekaj .signal-box { color: var(--czekaj-color); }

        .tp-cell {
            font-family: monospace;
            color: #b0b0b0;
        }

        .delete-cell {
            text-align: center;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

        /* Pop-up dla raportu */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 10% auto;
            padding: 20px;
            border: 1px solid var(--accent-color);
            width: 85%;
            max-width: 550px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover { color: #fff; }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            background: #151515;
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid var(--accent-color);
            margin: 10px 0 0 0;
            color: #fff;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        #parsed {
            font-family: monospace;
            font-size: 0.75rem;
            color: #666;
            margin-top: 15px;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>VOICE XTB 8.1 HYBRID</h1>
        <div class="status-tag">SYSTEM OPERACYJNY ONLINE</div>
    </header>

    <div class="voice-panel">
        <button class="btn btn-start" onclick="startSequence()">🎙️ START SKANOWANIA</button>
        <button class="btn btn-stop" onclick="stopSequence()">⛔ STOP</button>
        <div id="recognized">Oczekiwanie na uruchomienie mikrofonu...</div>
        <div id="comment">Gotowy do pracy</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Cena</th>
                    <th>TF / Czas</th>
                    <th style="text-align: center; width: 100px;">Entry (Ręczne)</th>
                    <th>Werdykt</th>
                    <th>Widełki M15</th>
                    <th>TP 1</th>
                    <th>TP 2</th>
                    <th>TP 3</th>
                    <th style="width: 40px; text-align: center;">Usuń</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="10">Oczekiwanie na dane z bazy...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="parsed">Bufor JSON: {}</div>
</div>

<div id="popup" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('popup').style.display='none'">&times;</span>
        <h3 style="margin-top:0; color:var(--accent-color);">🎙️ Raport Szczegółowy</h3>
        <div id="popupBody"></div>
    </div>
</div>

<script src="js/voice.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BLOKADA IFRAME — Android + Chrome + mikrofon -->
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self';">

    <title>VOICE XTB 6.8.3 PRO</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 10px; }
        button { margin: 5px; padding: 10px 14px; font-size: 16px; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: center; }
        th { background: #eee; }
        .afterprice { cursor: pointer; background: #fff7d6; }
        #recognized { font-weight: bold; color: #333; }
        #comment { margin-top: 10px; padding: 8px; background: #f3f3f3; }
    </style>
</head>

<body>

    <h2>VOICE XTB 6.8.3 PRO — analiza wielu tickerów</h2>

    <button onclick="startMic()">🎤 START mikrofon</button>
    <button onclick="stopMic()">⛔ STOP mikrofon</button>

    <div>
        <p>Rozpoznano: <span id="recognized"></span></p>
        <pre id="parsed"></pre>
        <div id="comment"></div>
    </div>

    <h3>Dane z głosu (LIVE)</h3>

    <table id="voiceTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Interwał</th>
                <th>Godzina</th>
                <th>Cena</th>
                <th>Entry</th>
                <th>Sygnał</th>
                <th>Widełki</th>
            </tr>
        </thead>
        <tbody id="voiceTableBody"></tbody>
    </table>

    <!-- ŁADOWANIE voice.js Z WYMUSZONYM ODŚWIEŻENIEM -->
    <script src="voice.js?v=999"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VOICE XTB 6.5 PRO MULTI-TF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0d0d0d;
    color: #e6e6e6;
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 15px;
}

h1 {
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: 600;
    color: #f2f2f2;
}

#controls {
    margin-bottom: 12px;
}

button {
    padding: 8px 14px;
    margin-right: 8px;
    border: none;
    border-radius: 4px;
    background: linear-gradient(135deg, #2b7cff, #1a5ed8);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}

button:nth-child(2) {
    background: linear-gradient(135deg, #c0392b, #99271f);
}

#comment,
#recognized,
#parsed {
    margin: 6px 0;
    font-size: 13px;
    opacity: 0.85;
    word-wrap: break-word;
}

/* ======= TABELA PRO ======= */

#proTable {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 6px;
    margin-top: 15px;
    font-size: 14px;
}

#proTable thead th {
    background: #1a1a1a;
    padding: 10px 6px;
    font-weight: 600;
    border-bottom: 2px solid #333;
    color: #dcdcdc;
}

#proTable tbody tr {
    background: #141414;
    transition: 0.2s;
}

#proTable tbody tr:hover {
    background: #1f1f1f;
}

#proTable td {
    padding: 10px 6px;
    text-align: center;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
}

/* zaokrąglenia wierszy */
#proTable tbody tr td:first-child {
    border-left: 1px solid #222;
    border-radius: 6px 0 0 6px;
}
#proTable tbody tr td:last-child {
    border-right: 1px solid #222;
    border-radius: 0 6px 6px 0;
}

/* komórki klikalne */
.ticker-cell,
.price-cell,
.entry-cell,
.delete-cell {
    cursor: pointer;
}

/* sygnały */
.signal-text {
    font-weight: 700;
    font-size: 15px;
    display: block;
    margin-bottom: 4px;
}

/* kolory sygnałów */
.signal-BUY {
    color: #00ff9d;
    text-shadow: 0 0 6px #00ff9d55;
}
.signal-SELL {
    color: #ff4d4d;
    text-shadow: 0 0 6px #ff4d4d55;
}
.signal-PRAWIEBUY,
.signal-CZEKAJ,
.signal-CZEKAJDO,
.signal-NEUTRAL {
    color: #ffd84d;
    text-shadow: 0 0 6px #ffd84d55;
}

/* ======= POPUP ======= */

.popup {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(3px);
}

.popup-content {
    background: #1a1a1a;
    margin: 80px auto;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 450px;
    color: #eee;
    box-shadow: 0 0 20px #000;
}

.popup-close {
    float: right;
    cursor: pointer;
    font-size: 20px;
    opacity: 0.8;
}

.popup-close:hover {
    opacity: 1;
}

#popupData {
    font-size: 13px;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-top: 10px;
}
</style>

</head>

<body>

<h1>VOICE XTB 6.5 PRO — M5 / M15 / H1</h1>

<div id="controls">
    <button onclick="startFullMic()">🎤 Start sekwencji pełnej</button>
    <button onclick="stopMic()">⛔ Stop</button>
</div>

<div id="comment">Status systemu...</div>
<div id="recognized">Rozpoznano: —</div>
<div id="parsed">Bufor JSON: —</div>

<table id="proTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Cena</th>
            <th>Interwał</th>
            <th>Entry</th>
            <th>Sygnał</th>
            <th>Widełki</th>
            <th>TP1</th>
            <th>TP2</th>
            <th>TP3</th>
            <th>🗑️</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- POPUP SZCZEGÓŁÓW -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span id="popupClose" class="popup-close">✖</span>
        <h3 id="popupTitle">Analiza TF</h3>
        <pre id="popupData"></pre>
    </div>
</div>

<script src="js/voice.js" defer></script>

</body>
</html>

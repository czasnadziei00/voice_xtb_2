<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VOICE XTB 7.4 PRO MULTI-TF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0d0d0d;
    color: #e6e6e6;
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 15px;
}

h1 {
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: 600;
    color: #f2f2f2;
}

#controls {
    margin-bottom: 12px;
}

button {
    padding: 8px 14px;
    margin-right: 8px;
    border: none;
    border-radius: 4px;
    background: linear-gradient(135deg, #2b7cff, #1a5ed8);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

button:nth-child(2) {
    background: linear-gradient(135deg, #c0392b, #99271f);
}

#comment,
#recognized,
#parsed {
    margin: 6px 0;
    font-size: 13px;
    opacity: 0.85;
    word-wrap: break-word;
}

/* ======= TABELA ======= */

#proTable {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 6px;
    margin-top: 15px;
    font-size: 14px;
}

#proTable thead th {
    background: #1a1a1a;
    padding: 10px 6px;
    font-weight: 600;
    border-bottom: 2px solid #333;
    color: #dcdcdc;
}

#proTable tbody tr {
    background: #141414;
    transition: 0.2s;
}

#proTable tbody tr:hover {
    background: #1f1f1f;
}

#proTable td {
    padding: 10px 6px;
    text-align: center;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
}

.ticker-cell,
.price-cell,
.entry-cell,
.delete-cell {
    cursor: pointer;
}

/* ======= POPUP ======= */

.popup {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
}

.popup-content {
    background: #121212;
    margin: 60px auto;
    padding: 20px;
    border-radius: 12px;
    width: 92%;
    max-width: 480px;
    color: #eee;
    box-shadow: 0 0 25px #000;
    border: 1px solid #222;
}

.popup-close {
    float: right;
    cursor: pointer;
    font-size: 22px;
    opacity: 0.7;
}

/* ======= KOLOROWANIE SYGNAŁÓW ======= */

.row-buy {
    background: rgba(0, 180, 0, 0.22) !important;
}

.row-sell {
    background: rgba(255, 0, 0, 0.22) !important;
}

.row-prawie {
    background: rgba(255, 215, 0, 0.22) !important;
}

.row-czekajdo {
    background: rgba(0, 120, 255, 0.22) !important;
}

.row-czekaj {
    background: rgba(160, 160, 160, 0.18) !important;
}

/* ======= KOLOROWANIE TP ======= */

.tp-hit {
    color: #00ff7f !important;
    font-weight: 700;
}

.tp-close {
    color: #ffd700 !important;
    font-weight: 600;
}

.tp-fail {
    color: #ff4d4d !important;
    font-weight: 700;
}
</style>

</head>

<body>

<h1>VOICE XTB 7.4 PRO — M5 / M15 / H1</h1>

<div id="controls">
    <button onclick="startSequence()">🎤 Start sekwencji pełnej</button>
    <button onclick="stopSequence()">⛔ Stop</button>
</div>

<div id="comment">Status systemu...</div>
<div id="recognized">Rozpoznano: —</div>
<div id="parsed">Bufor JSON: —</div>

<table id="proTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Cena</th>
            <th>Interwał</th>
            <th>Entry</th>
            <th>Sygnał</th>
            <th>Widełki</th>
            <th>TP1</th>
            <th>TP2</th>
            <th>TP3</th>
            <th>🗑️</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span id="popupClose" class="popup-close">✖</span>
        <div id="popupBody"></div>
    </div>
</div>

<script src="js/voice.js"></script>
</body>
</html>

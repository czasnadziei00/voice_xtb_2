<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VOICE XTB 6.5 PRO MULTI-TF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>VOICE XTB 6.5 PRO — M5 / M15 / H1</h1>

<div id="controls">
    <button onclick="startFullMic()">🎤 Start sekwencji pełnej</button>
    <button onclick="stopMic()">⛔ Stop</button>
</div>

<div id="comment">Status systemu...</div>
<div id="recognized">Rozpoznano: —</div>
<div id="parsed">Bufor JSON: —</div>

<table id="tfTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>M5</th>
            <th>M15</th>
            <th>H1</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- POPUP SZCZEGÓŁÓW -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span id="popupClose" class="popup-close">✖</span>
        <h3 id="popupTitle">Analiza TF</h3>
        <pre id="popupData"></pre>
    </div>
</div>

<script src="js/voice.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOICE XTB 8.3 HYBRID PURE SIGNAL</title>

<style>

:root{
    --bg-color:#121212;
    --card-bg:#1e1e1e;
    --text-color:#e0e0e0;
    --accent-color:#ffd166;

    /* JASKRAWE KOLORY WIERSZY */
    --buy-color:#00ff88;
    --hold-color:#00cfff;
    --reduce-color:#ffb347;
    --sell-color:#ff3b5c;
    --wait-color:#8d99ae;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-color);
    color:var(--text-color);
    margin:0;
    padding:15px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

h1{

}

.btn{

}

.btn-start{

}

}

#comment{

}

.table-container{
    overflow-x:auto;
    background:var(--card-bg);
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #333;
    text-align:center;
    transition:all .18s ease;
}

th{
    background:#252525;
    color:#ffd166;
}

/* =========================================
   JASKRAWE PEŁNE WIERSZE
========================================= */

    background:linear-gradient(

}

.row-buy:hover{

.row-hold{

    ) !important;
}

.row-hold td{
    color:#ffffff;

.row-hold:hover{

/* ========================================= */

.ticker-cell{
    font-weight:bold;
    cursor:pointer;
    color:#fff;
}

.price-cell{
    font-weight:bold;
    font-family:monospace;
    font-size:15px;
}

.entry-cell{
    color:#ffd166;
    font-family:monospace;
    cursor:pointer;
    font-weight:bold;
}

.signal-box{
    display:inline-block;
    padding:7px 12px;
    border-radius:8px;
    background:rgba(0,0,0,.30);
    border:1px solid rgba(255,255,255,.12);
    font-weight:800;
    min-width:95px;
    letter-spacing:.3px;
    backdrop-filter:blur(4px);
}

.delete-cell{
    cursor:pointer;
    font-size:18px;
}

.popup-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:999;
}

.modal{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:92%;
    max-width:680px;
    z-index:1000;
    max-height:85vh;
    overflow-y:auto;
}

.modal-content{
    background:#1e1e1e;
    padding:25px;
    border-radius:12px;
    border:1px solid #ffd166;
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.close-btn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:28px;
    cursor:pointer;
    color:#aaa;
}

.close-btn:hover{
    color:#fff;
}

/* =========================================
   RAPORT
========================================= */

.report-html{
    font-family:system-ui,-apple-system,sans-serif;
    line-height:1.6;
}

.report-html h2{
    color:#ffd166;
    border-bottom:1px solid #444;
    padding-bottom:6px;
    margin-top:15px;
    font-size:1.3rem;
}

.report-html hr{
    border:0;
    border-top:1px dashed #555;
    margin:15px 0;
}

.report-html ul{
    padding-left:20px;
    margin:10px 0;
}

.report-html li{
    margin-bottom:6px;
}

.report-html strong{
    color:#fff;
}

.report-table{
    width:100%;
    margin:15px 0;
    border-collapse:collapse;
    background:#111;
    border-radius:6px;
    overflow:hidden;
}

.report-table th{
    background:#292929;
    color:#ffd166;
    font-weight:bold;
    padding:10px;
    font-size:0.9rem;
}

.report-table td{
    padding:10px;
    border-bottom:1px solid #222;
    font-size:0.95rem;
}

.report-summary-footer{
    background:#252525;
    padding:10px;
    border-radius:6px;
    font-size:0.85rem;
    color:#ccc;
    margin-top:15px;
    border-left:4px solid #ffd166;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>VOICE XTB 8.3 HYBRID</h1>
<div>GPW LONG ONLY — DAYTRADING / SWING</div>
</header>

<div class="voice-panel">

<button class="btn btn-start" onclick="startSequence()">
🎙️ START
</button>

<button class="btn btn-stop" onclick="stopSequence()">
⛔ STOP
</button>

<div id="recognized">
Oczekiwanie na mikrofon...
</div>

<div id="comment">
System gotowy
</div>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Ticker</th>
<th>Cena</th>
<th>TF</th>
<th>Entry</th>
<th>Sygnał</th>
<th>Widełki</th>
<th>TP1</th>
<th>TP2</th>
<th>TP3</th>
<th>Usuń</th>
</tr>
</thead>

<tbody id="table-body">

<tr>
<td colspan="10">
Oczekiwanie na dane...
</td>
</tr>

</tbody>

</table>

</div>

<div id="parsed"
style="margin-top:15px;font-family:monospace;color:#666;">
</div>

</div>

<div id="popupOverlay"
class="popup-overlay"
onclick="closeModal()">
</div>

<div id="popup" class="modal">

<div class="modal-content">

<span class="close-btn"
onclick="closeModal()">
&times;
</span>

<h3 style="color:#ffd166; margin-top: 0; border-bottom: 2px solid #ffd166; padding-bottom: 8px;">
📊 INTELIGENTNY PROFILOWANY KOMENTARZ RYNKOWY
</h3>

<div id="popupBody"></div>

</div>

</div>

<script>

function closeModal(){
    document.getElementById("popup").style.display="none";
    document.getElementById("popupOverlay").style.display="none";
}

const backend = "https://voice-xtb.onrender.com/voice-parse";
const STORAGE_KEY = "xtbtablememoryv2multitf";

let recognition = null;
let recognizing = false;
let currentStep = 0;
let tempRecord = {};
let isFetching = false;

const tickers = {};

const steps = [
"Podaj ticker",
"Podaj interwał",
"Podaj czas lub dzień",
"Podaj cenę open",
"Podaj cenę high",
"Podaj cenę low",
"Podaj cenę close",
"Podaj wolumen",
"Podaj MA 20",
"Podaj DEMA 9",
"Podaj RSI"
];

// ======================================================
// SPEECH INIT
// ======================================================

function initRecognition(){
    const SR = window.webkitSpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return null;

    const rec = new SR();
    rec.lang = "pl-PL";
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e)=>{
        const text = e.results[0][0].transcript.trim();
        document.getElementById("recognized").textContent = `Rozpoznano: ${text}`;
        handleRecognized(text);
    };

    rec.onend = ()=>{
        if(recognizing){
            if(currentStep < steps.length){
                setTimeout(()=>{ sayStep(); },250);
            }else{
                recognizing = false;
                finalizeRecord();
            }
        }
    };

    rec.onerror = (e)=>{
        console.log(e.error);
        if(recognizing){
            setTimeout(()=>{ sayStep(); },300);
        }
    };
    return rec;
}

recognition = initRecognition();

// ======================================================
// SPEECH OUTPUT
// ======================================================

function sayStep(){
    if(currentStep >= steps.length || !recognizing) return;

    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(steps[currentStep]);
    msg.lang = "pl-PL";
    msg.rate = 1.08;

    msg.onend = ()=>{
        if(recognizing){
            setTimeout(()=>{
                try{
                    recognition.start();
                }catch(err){
                    setTimeout(()=>{ if(recognizing) recognition.start(); },350);
                }
            },180);
        }
    };
    speechSynthesis.speak(msg);
}

// ======================================================
// HELPERS / PARSERS
// ======================================================

function extractNumber(text){
    if(!text) return 0;
    text = text.toString()
    .toLowerCase()
    .replaceAll("kropka",".")
    .replaceAll("przecinek",".")
    .replace(/\s+/g,"");

    const num = parseFloat(text);
    return isFinite(num) ? num : 0;
}

function normalizeInterval(tf){
    tf = tf.toUpperCase().trim();
    if(tf==="5" || tf==="M5") return "M5";
    if(tf==="15" || tf==="M15") return "M15";
    if(tf==="H1" || tf==="1H" || tf==="60") return "H1";
    if(tf==="D1" || tf==="1D" || tf==="D") return "D1";
    return tf;
}

function parseAndAlignTime(rawText, intervalStr){
    const now = new Date();
    if(intervalStr==="D1"){
        return now.toISOString().split("T")[0];
    }

    let h = now.getHours();
    let m = now.getMinutes();
    const clean = rawText.replace(/[^\d]/g,"");

    if(clean.length===4){
        h = parseInt(clean.substring(0,2));
        m = parseInt(clean.substring(2));
    }else if(clean.length===3){
        h = parseInt(clean.substring(0,1));
        m = parseInt(clean.substring(1));
    }

    if(intervalStr==="M5") h=Math.floor(m/5)*5;
    if(intervalStr==="M15") m=Math.floor(m/15)*15;
    if(intervalStr==="H1") m=0;

    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function handleRecognized(text){
    switch(currentStep){
        case 0: tempRecord.ticker = text.toUpperCase().replace(/\s+/g,""); break;
        case 1: tempRecord.interval = normalizeInterval(text); break;
        case 2: tempRecord.time = parseAndAlignTime(text, tempRecord.interval); break;
        case 3: tempRecord.open = extractNumber(text); break;
        case 4: tempRecord.high = extractNumber(text); break;
        case 5: tempRecord.low = extractNumber(text); break;
        case 6: tempRecord.close = extractNumber(text); break;
        case 7: tempRecord.volume = extractNumber(text); break;
        case 8: tempRecord.ma20 = extractNumber(text); break;
        case 9: tempRecord.dema9 = extractNumber(text); break;
        case 10: tempRecord.rsi = extractNumber(text); break;
    }
    currentStep++;
}

// ======================================================
// PARSER MARKDOWN NA CZYSTY HTML DO OKNA POPUP
// ======================================================
function parseMarkdownToHtml(md) {
    if (!md) return "";
    let lines = md.split("\n");
    let html = '<div class="report-html">';
    let inTable = false;

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        // Wykrywanie tabeli logicznej
        if (line.startsWith("|")) {
            if (line.includes(":---")) return; // pomiń separator tabeli
            if (!inTable) {
                html += '<table class="report-table">';
                inTable = true;
                
                // Nagłówek tabeli
                let cols = line.split("|").map(c => c.trim()).filter(c => c !== "");
                html += "<thead><tr>";
                cols.forEach(c => html += `<th>${c}</th>`);
                html += "</tr></thead><tbody>";
            } else {
                // Wiersz tabeli danych
                let cols = line.split("|").map(c => c.trim()).filter(c => c !== "");
                html += "<tr>";
                cols.forEach(c => html += `<td>${c}</td>`);
                html += "</tr>";
            }
            return;
        } else if (inTable) {
            html += "</tbody></table>";
            inTable = false;
        }

        // Tytuły i sekcje
        if (line.startsWith("---") && line.endsWith("---")) {
            return; // Usuń separator główny backendu
        }
        if (line.startsWith("###") || line.startsWith("📌") || line.startsWith("⭐")) {
            html += `<h2>${line}</h2>`;
            return;
        }

        // Listy interwałów (od myślników)
        if (line.startsWith("*")) {
            let content = line.substring(1).trim();
            // Przetwarzanie pogrubienia **tekst**
            content = content.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            html += `<ul><li>${content}</li></ul>`;
            return;
        }

        // Dół raportu (podsumowanie układu średnich)
        if (line.startsWith("Układ średnich:")) {
            html += `<div class="report-summary-footer">${line}</div>`;
            return;
        }

        // Reszta standardowych bloków tekstu i pogrubienia wniosków
        let txt = line.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        html += `<p>${txt}</p>`;
    });

    if (inTable) html += "</tbody></table>";
    html += "</div>";
    return html;
}

// ======================================================
// FINALIZE RECORD
// ======================================================

async function finalizeRecord(){
    if(isFetching) return;
    isFetching = true;

    document.getElementById("comment").textContent = "⏳ Analiza...";
    document.getElementById("parsed").textContent = JSON.stringify(tempRecord);

    try{
        const response = await fetch(`${backend}?t=${Date.now()}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(tempRecord)
        });

        const data = await response.json();
        handleBackendData(data);
        document.getElementById("comment").textContent = "✔️ Analiza gotowa";
    }catch(err){
        document.getElementById("comment").textContent = "❌ Błąd połączenia";
    }

    tempRecord = {};
    currentStep = 0;
    isFetching = false;
}

function normalizeSignal(signal){
    if(!signal) return "HOLD";
    const s = signal.toUpperCase();
    if(s.includes("SELL") || s.includes("EXIT")) return "SELL";
    if(s.includes("REDUKUJ") || s.includes("REALIZUJ")) return "REDUKUJ";
    if(s.includes("HOLD") || s.includes("MOMENTUM") || s.includes("TRZYMAJ")) return "HOLD";
    if(s.includes("BUY") || s.includes("LONG") || s.includes("BREAKOUT") || s.includes("ACCEL")) return "BUY";
    return "BUY";
}

function handleBackendData(d){
    const ticker = d.ticker;
    const tf = normalizeInterval(d.interval);
    d.signal = normalizeSignal(d.signal);

    if(!tickers[ticker]){
        tickers[ticker] = {
            globalEntry:"",
            updatedAt:0
        };
    }

    tickers[ticker].updatedAt = Date.now();
    tickers[ticker].lastTF = tf;

    if(!tickers[ticker][tf]){
        tickers[ticker][tf] = { history:[] };
    }

    tickers[ticker][tf].last = d;
    updateTable();
}

// ======================================================
// TABLE RENDERING
// ======================================================

function updateTable(){
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    const sorted = Object.keys(tickers).sort((a,b)=> tickers[b].updatedAt - tickers[a].updatedAt);

    if(sorted.length===0){
        tbody.innerHTML = `<tr><td colspan="10">Oczekiwanie na dane...</td></tr>`;
        return;
    }

    sorted.forEach(ticker=>{
        const t = tickers[ticker];
        const tf = t.lastTF || "M5";
        const rec = t[tf]?.last;
        if(!rec) return;

        const row = document.createElement("tr");
        row.className = getRowClass(rec.signal);

        row.innerHTML = `
        <td class="ticker-cell">${ticker}</td>
        <td class="price-cell">${Number(rec.close).toFixed(2)}</td>
        <td>${rec.interval}<br><small>${rec.time}</small></td>
        <td class="entry-cell">${t.globalEntry || "—"}</td>
        <td><div class="signal-box">${rec.signal || "BRAK"}</div></td>
        <td>${rec.widelki || "—"}</td>
        <td>${rec.tp1 || "—"}</td>
        <td>${rec.tp2 || "—"}</td>
        <td>${rec.tp3 || "—"}</td>
        <td class="delete-cell">🗑️</td>
        `;
        tbody.appendChild(row);
    });
    saveTable();
}

function getRowClass(sig){
    if(!sig) return "row-wait";
    sig = sig.toUpperCase();
    if(sig==="BUY") return "row-buy";
    if(sig==="HOLD") return "row-hold";
    if(sig==="REDUKUJ") return "row-reduce";
    if(sig==="SELL") return "row-sell";
    return "row-wait";
}

function startSequence(){
    if(recognizing) return;
    tempRecord = {};
    currentStep = 0;
    recognizing = true;
    sayStep();
}

function stopSequence(){
    recognizing = false;
    currentStep = 0;
    tempRecord = {};
    try{ recognition.stop(); }catch(err){}
    document.getElementById("comment").textContent = "⛔ Zatrzymano";
}

// ======================================================
// EVENTS - KLIKNIĘCIE TICKERA I GENEROWANIE POPUPU HTML
// ======================================================

document.addEventListener("click", async(e)=>{
    const cell = e.target.closest("td");
    const row = e.target.closest("tr");
    if(!cell || !row) return;

    const ticker = row.querySelector(".ticker-cell")?.textContent.trim();

    // AKCJA: USUWANIE
    if(cell.classList.contains("delete-cell")){
        delete tickers[ticker];
        updateTable();
        try{
            await fetch(`${backend}/delete`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({ticker:ticker})
            });
        }catch(err){ console.log(err); }
        return;
    }

    // AKCJA: OTWIERANIE ROZBUDOWANEGO POPUPU
    if(cell.classList.contains("ticker-cell")){
        const tf = tickers[ticker].lastTF;
        const rec = tickers[ticker][tf]?.last;

        if(rec && rec.comment){
            // Zamiana surowego tekstu z backendu na piękny HTML dla laika
            const formattedHtml = parseMarkdownToHtml(rec.comment);
            
            document.getElementById("popupBody").innerHTML = formattedHtml;
            document.getElementById("popup").style.display = "block";
            document.getElementById("popupOverlay").style.display = "block";
        }
    }
});

// ======================================================
// LOCAL STORAGE & CLOUD MEMORY LOAD
// ======================================================

function saveTable(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
}

async function loadTable(){
    const baseEndpoint = backend.replace("/voice-parse", "");
    try{
        const response = await fetch(`${baseEndpoint}/memory?t=${Date.now()}`);
        if(response.ok){
            const data = await response.json();
            if(data && Object.keys(data).length > 0){
                for(let member in tickers){ delete tickers[member]; }

                Object.keys(data).forEach(ticker=>{
                    tickers[ticker] = {
                        globalEntry: data[ticker].global_entry || "",
                        updatedAt: Date.now()
                    };

                    ["M5", "M15", "H1", "D1"].forEach(tf=>{
                        if(data[ticker][tf] && data[ticker][tf].last_data && Object.keys(data[ticker][tf].last_data).length > 0){
                            if(!tickers[ticker][tf]){ tickers[ticker][tf] = { history:[] }; }
                            tickers[ticker][tf].last = data[ticker][tf].last_data;
                            tickers[ticker].lastTF = tf;
                        }
                    });
                });
                updateTable();
                return;
            }
        }
    }catch(err){ console.log("Blad pobierania pamieci z chmury:", err); }

    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
        Object.assign(tickers, JSON.parse(raw));
        updateTable();
    }
}

document.addEventListener("DOMContentLoaded", loadTable);
</script>

</body>
</html>

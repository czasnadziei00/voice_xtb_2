<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOICE XTB 8.1 HYBRID AGGRESSIVE</title>

<style>
:root{
    --bg-color:#121212;
    --card-bg:#1e1e1e;
    --text-color:#e0e0e0;
    --accent-color:#ffd166;
    --buy-premium:#06d6a0;
    --buy-normal:#4cc9f0;
    --buy-soft:#72efdd;
    --sell-color:#ef476f;
    --czekaj-color:#8d99ae;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-color);
    color:var(--text-color);
    margin:0;
    padding:15px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

h1{
    color:var(--accent-color);
}

.voice-panel{
    background:var(--card-bg);
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}

.btn{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

.btn-start{
    background:#06d6a0;
    color:#000;
}

.btn-stop{
    background:#ef476f;
    color:#fff;
}

#recognized{
    margin-top:10px;
    color:#ffd166;
}

#comment{
    margin-top:5px;
    font-weight:bold;
}

.table-container{
    overflow-x:auto;
    background:var(--card-bg);
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #333;
}

th{
    background:#252525;
    color:#ffd166;
}

.row-buy-premium{
    background:rgba(6,214,160,.22);
}

.row-buy{
    background:rgba(76,201,240,.18);
}

.row-buy-soft{
    background:rgba(114,239,221,.12);
}

.row-sell{
    background:rgba(239,71,111,.16);
}

.row-czekaj{
    background:transparent;
}

.ticker-cell{
    font-weight:bold;
    cursor:pointer;
    color:#fff;
}

.price-cell{
    font-weight:bold;
    font-family:monospace;
}

.entry-cell{
    color:#ffd166;
    font-family:monospace;
    cursor:pointer;
    text-align:center;
}

.signal-box{
    display:inline-block;
    padding:4px 8px;
    border-radius:5px;
    background:#2a2a2a;
    font-weight:bold;
}

.delete-cell{
    cursor:pointer;
    text-align:center;
}

.popup-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:999;
}

.modal{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    max-width:600px;
    z-index:1000;
}

.modal-content{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    border:1px solid #ffd166;
}

.close-btn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:28px;
    cursor:pointer;
}

pre{
    white-space:pre-wrap;
    background:#111;
    padding:15px;
    border-radius:8px;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>VOICE XTB 8.1 HYBRID</h1>
<div>TRYB 60% AGRESYWNY / 40% KONSERWATYWNY</div>
</header>

<div class="voice-panel">
<button class="btn btn-start" onclick="startSequence()">🎙️ START</button>
<button class="btn btn-stop" onclick="stopSequence()">⛔ STOP</button>

<div id="recognized">Oczekiwanie na mikrofon...</div>
<div id="comment">System gotowy</div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Ticker</th>
<th>Cena</th>
<th>TF</th>
<th>Entry</th>
<th>Sygnał</th>
<th>Widełki</th>
<th>TP1</th>
<th>TP2</th>
<th>TP3</th>
<th>Usuń</th>
</tr>
</thead>

<tbody id="table-body">
<tr>
<td colspan="10">Oczekiwanie na dane...</td>
</tr>
</tbody>
</table>
</div>

<div id="parsed" style="margin-top:15px;font-family:monospace;color:#666;"></div>

</div>

<div id="popupOverlay" class="popup-overlay" onclick="closeModal()"></div>

<div id="popup" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<h3 style="color:#ffd166;">Raport</h3>
<div id="popupBody"></div>
</div>
</div>

<script>

function closeModal(){
    document.getElementById("popup").style.display="none";
    document.getElementById("popupOverlay").style.display="none";
}

const backend="https://voice-xtb.onrender.com/voice-parse";
const STORAGE_KEY="xtbtablememoryv2multitf";

let recognition=null;
let recognizing=false;
let currentStep=0;
let tempRecord={};
let isFetching=false;

const tickers={};

const steps=[
"Podaj ticker",
"Podaj interwał",
"Podaj czas lub dzień",
"Podaj cenę open",
"Podaj cenę high",
"Podaj cenę low",
"Podaj cenę close",
"Podaj wolumen",
"Podaj MA 20",
"Podaj DEMA 9",
"Podaj RSI"
];

function initRecognition(){

    const SR=window.webkitSpeechRecognition || window.SpeechRecognition;

    if(!SR) return null;

    const rec=new SR();

    rec.lang="pl-PL";
    rec.continuous=false;
    rec.interimResults=false;

    rec.onresult=(e)=>{

        const text=e.results[0][0].transcript.trim();

        document.getElementById("recognized").textContent=
        `Rozpoznano: ${text}`;

        handleRecognized(text);
    };

    rec.onend=()=>{

        if(recognizing){

            if(currentStep < steps.length){

                setTimeout(()=>{
                    sayStep();
                },250);

            }else{

                recognizing=false;
                finalizeRecord();
            }
        }
    };

    rec.onerror=(e)=>{

        console.log(e.error);

        if(recognizing){

            setTimeout(()=>{
                sayStep();
            },300);
        }
    };

    return rec;
}

recognition=initRecognition();

function sayStep(){

    if(currentStep >= steps.length || !recognizing) return;

    speechSynthesis.cancel();

    const msg=new SpeechSynthesisUtterance(steps[currentStep]);

    msg.lang="pl-PL";
    msg.rate=1.08;

    msg.onend=()=>{

        if(recognizing){

            setTimeout(()=>{

                try{
                    recognition.start();
                }catch(err){

                    setTimeout(()=>{
                        if(recognizing) recognition.start();
                    },350);
                }

            },180);
        }
    };

    speechSynthesis.speak(msg);
}

function extractNumber(text){

    if(!text) return 0;

    text=text.toString()
    .toLowerCase()
    .replaceAll("kropka",".")
    .replaceAll("przecinek",".")
    .replace(/\s+/g,"");

    const num=parseFloat(text);

    return isFinite(num) ? num : 0;
}

function normalizeInterval(tf){

    tf=tf.toUpperCase().trim();

    if(tf==="5" || tf==="M5") return "M5";
    if(tf==="15" || tf==="M15") return "M15";
    if(tf==="H1" || tf==="1H" || tf==="60") return "H1";
    if(tf==="D1" || tf==="1D" || tf==="D") return "D1";

    return tf;
}

function parseAndAlignTime(rawText, intervalStr){

    const now=new Date();

    if(intervalStr==="D1"){

        return now.toISOString().split("T")[0];
    }

    let h=now.getHours();
    let m=now.getMinutes();

    const clean=rawText.replace(/[^\d]/g,"");

    if(clean.length===4){

        h=parseInt(clean.substring(0,2));
        m=parseInt(clean.substring(2));

    }else if(clean.length===3){

        h=parseInt(clean.substring(0,1));
        m=parseInt(clean.substring(1));
    }

    if(intervalStr==="M5"){
        m=Math.floor(m/5)*5;
    }

    if(intervalStr==="M15"){
        m=Math.floor(m/15)*15;
    }

    if(intervalStr==="H1"){
        m=0;
    }

    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function handleRecognized(text){

    switch(currentStep){

        case 0:
            tempRecord.ticker=text.toUpperCase().replace(/\s+/g,"");
        break;

        case 1:
            tempRecord.interval=normalizeInterval(text);
        break;

        case 2:
            tempRecord.time=parseAndAlignTime(text,tempRecord.interval);
        break;

        case 3:
            tempRecord.open=extractNumber(text);
        break;

        case 4:
            tempRecord.high=extractNumber(text);
        break;

        case 5:
            tempRecord.low=extractNumber(text);
        break;

        case 6:
            tempRecord.close=extractNumber(text);
        break;

        case 7:
            tempRecord.volume=extractNumber(text);
        break;

        case 8:
            tempRecord.ma20=extractNumber(text);
        break;

        case 9:
            tempRecord.dema9=extractNumber(text);
        break;

        case 10:
            tempRecord.rsi=extractNumber(text);
        break;
    }

    currentStep++;
}

async function finalizeRecord(){

    if(isFetching) return;

    isFetching=true;

    document.getElementById("comment").textContent=
    "⏳ Analiza agresywna...";

    document.getElementById("parsed").textContent=
    JSON.stringify(tempRecord);

    try{

        const response=await fetch(`${backend}?t=${Date.now()}`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(tempRecord)
        });

        const data=await response.json();

        handleBackendData(data);

        document.getElementById("comment").textContent=
        "✔️ Analiza gotowa";

    }catch(err){

        document.getElementById("comment").textContent=
        "❌ Błąd połączenia";
    }

    tempRecord={};
    currentStep=0;
    isFetching=false;
}

function handleBackendData(d){

    const ticker=d.ticker;
    const tf=normalizeInterval(d.interval);

    if(!tickers[ticker]){

        tickers[ticker]={
            globalEntry:"",
            updatedAt:0
        };
    }

    tickers[ticker].updatedAt=Date.now();
    tickers[ticker].lastTF=tf;

    if(!tickers[ticker][tf]){

        tickers[ticker][tf]={
            history:[]
        };
    }

    tickers[ticker][tf].last=d;

    updateTable();
}

function updateTable(){

    const tbody=document.getElementById("table-body");

    tbody.innerHTML="";

    const sorted=Object.keys(tickers)
    .sort((a,b)=>tickers[b].updatedAt - tickers[a].updatedAt);

    if(sorted.length===0){

        tbody.innerHTML=
        `<tr><td colspan="10">Brak danych</td></tr>`;

        return;
    }

    sorted.forEach(ticker=>{

        const t=tickers[ticker];

        const tf=t.lastTF || "M5";

        const rec=t[tf]?.last;

        if(!rec) return;

        const row=document.createElement("tr");

        row.className=getRowClass(rec.signal);

        row.innerHTML=`
        <td class="ticker-cell">${ticker}</td>
        <td class="price-cell">${Number(rec.close).toFixed(2)}</td>
        <td>${rec.interval}<br><small>${rec.time}</small></td>
        <td class="entry-cell">${t.globalEntry || "—"}</td>
        <td><div class="signal-box">${rec.signal || "BRAK"}</div></td>
        <td>${rec.widelki || "—"}</td>
        <td>${rec.tp1 || "—"}</td>
        <td>${rec.tp2 || "—"}</td>
        <td>${rec.tp3 || "—"}</td>
        <td class="delete-cell">🗑️</td>
        `;

        tbody.appendChild(row);
    });

    saveTable();
}

/* =====================================================
   NOWA LOGIKA 60% AGRESJA / 40% KONSERWATYWNIE
===================================================== */

function getRowClass(sig){

    if(!sig) return "row-czekaj";

    sig=sig.toUpperCase();

    // PREMIUM
    if(sig.includes("PREMIUM")){
        return "row-buy-premium";
    }

    // AGRESYWNY BUY
    if(
        sig.includes("BUY") ||
        sig.includes("ACCEL") ||
        sig.includes("BREAKOUT") ||
        sig.includes("MOCNY") ||
        sig.includes("MOMENTUM") ||
        sig.includes("KOREKTA")
    ){
        return "row-buy";
    }

    // LEKKI BUY
    if(
        sig.includes("LONG") ||
        sig.includes("AKUMULACJA") ||
        sig.includes("WZROST")
    ){
        return "row-buy-soft";
    }

    // SELL
    if(
        sig.includes("EXIT") ||
        sig.includes("SELL") ||
        sig.includes("REDUKUJ") ||
        sig.includes("SŁABNIE") ||
        sig.includes("REALIZUJ")
    ){
        return "row-sell";
    }

    return "row-czekaj";
}

function startSequence(){

    if(recognizing) return;

    tempRecord={};

    currentStep=0;

    recognizing=true;

    sayStep();
}

function stopSequence(){

    recognizing=false;

    currentStep=0;

    tempRecord={};

    try{
        recognition.stop();
    }catch(err){}

    document.getElementById("comment").textContent=
    "⛔ Zatrzymano";
}

document.addEventListener("click", async(e)=>{

    const cell=e.target.closest("td");
    const row=e.target.closest("tr");

    if(!cell || !row) return;

    const ticker=row.querySelector(".ticker-cell")?.textContent.trim();

    // DELETE
    if(cell.classList.contains("delete-cell")){

        delete tickers[ticker];

        updateTable();

        try{

            await fetch(`${backend}/delete`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    ticker:ticker
                })
            });

        }catch(err){

            console.log(err);
        }

        return;
    }

    // POPUP
    if(cell.classList.contains("ticker-cell")){

        const tf=tickers[ticker].lastTF;

        const rec=tickers[ticker][tf]?.last;

        if(rec && rec.comment){

            document.getElementById("popupBody").innerHTML=
            `<pre>${rec.comment}</pre>`;

            document.getElementById("popup").style.display="block";

            document.getElementById("popupOverlay").style.display="block";
        }
    }
});

function saveTable(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(tickers)
    );
}

async function loadTable(){

    const baseEndpoint = backend.replace("/voice-parse", "");
    
    try {
        const response = await fetch(`${baseEndpoint}/memory?t=${Date.now()}`);
        if (response.ok) {
            const data = await response.json();
            if (data && Object.keys(data).length > 0) {
                for (let member in tickers) {
                    delete tickers[member];
                }
                
                Object.keys(data).forEach(ticker => {
                    tickers[ticker] = {
                        globalEntry: data[ticker].global_entry || "",
                        updatedAt: Date.now()
                    };
                    
                    ["M5", "M15", "H1", "D1"].forEach(tf => {
                        if (data[ticker][tf] && data[ticker][tf].last_data && Object.keys(data[ticker][tf].last_data).length > 0) {
                            if (!tickers[ticker][tf]) {
                                tickers[ticker][tf] = { history: [] };
                            }
                            tickers[ticker][tf].last = data[ticker][tf].last_data;
                            tickers[ticker].lastTF = tf;
                        }
                    });
                });
                
                updateTable();
                return;
            }
        }
    } catch (err) {
        console.log("Blad pobierania pamieci z backendu:", err);
    }

    const raw=localStorage.getItem(STORAGE_KEY);

    if(raw){

        Object.assign(tickers,JSON.parse(raw));

        updateTable();
    }
}

document.addEventListener("DOMContentLoaded",loadTable);

</script>

</body>
</html>

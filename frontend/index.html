<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VOICE XTB 6.5 PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>VOICE XTB 6.5 PRO</h1>

<div id="controls">
    <button onclick="startFullMic()">🎤 Start sekwencji pełnej</button>
    <button onclick="stopMic()">⛔ Stop</button>
</div>

<div id="comment">Status systemu...</div>
<div id="status">Bufor danych...</div>
<div id="recognized">Rozpoznano: —</div>
<div id="parsed">Bufor JSON: —</div>

<table id="voiceTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Interwał</th>
            <th>Czas</th>
            <th>Entry</th>
            <th>Sygnał</th>
            <th>Widełki</th>
            <th>TP1 / TP2 / TP3</th>
            <th>📊</th>
            <th>🗑</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- POPUP 6.5 PRO -->
<div id="popup45" class="popup">
    <div class="popup-content">
        <span id="popupClose" class="popup-close">✖</span>
        <h3>Analiza FINAL</h3>
        <pre id="popupData"></pre>
    </div>
</div>

<script src="js/voice.js"></script>
<script src="js/main.js"></script>

</body>
</html>

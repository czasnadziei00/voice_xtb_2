<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOICE XTB 7.4 PRO MULTI-TF</title>

<link rel="icon" href="favicon.ico">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#0d0d0d;
    color:#e6e6e6;
    font-family:"Segoe UI",Arial,sans-serif;
}

/* ======================================================
   HEADER
====================================================== */

h1{
    margin:0 0 16px 0;
    font-size:22px;
    font-weight:700;
    color:#f2f2f2;
}

/* ======================================================
   CONTROLS
====================================================== */

#controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    color:#fff;
    font-size:14px;
    font-weight:600;
    transition:0.2s;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button:hover{
    transform:translateY(-1px);
}

.btn-start{
    background:linear-gradient(
        135deg,
        #2b7cff,
        #1a5ed8
    );
}

.btn-stop{
    background:linear-gradient(
        135deg,
        #c0392b,
        #99271f
    );
}

/* ======================================================
   STATUS
====================================================== */

#comment,
#recognized,
#parsed{
    margin:6px 0;
    font-size:13px;
    color:#bfbfbf;
    word-wrap:break-word;
}

/* ======================================================
   TABLE
====================================================== */

.table-wrapper{
    width:100%;
    overflow-x:auto;
    margin-top:14px;
}

#proTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0 6px;
    min-width:1000px;
    font-size:14px;
}

#proTable thead th{
    background:#1a1a1a;
    padding:12px 8px;
    border-bottom:2px solid #333;
    color:#dcdcdc;
    font-weight:700;
    text-align:center;
}

#proTable tbody tr{
    background:#141414;
    transition:
        background 0.25s ease,
        transform 0.15s ease;
}

@media (hover:hover){

    #proTable tbody tr:hover{
        background:#1f1f1f;
        transform:scale(1.002);
    }

}

#proTable td{
    padding:10px 6px;
    border-top:1px solid #222;
    border-bottom:1px solid #222;
    text-align:center;
    vertical-align:middle;
}

/* ======================================================
   CELLS
====================================================== */

.ticker-cell,
.price-cell,
.entry-cell,
.delete-cell{
    cursor:pointer;
    user-select:none;
}

.ticker-cell{
    font-weight:700;
    color:#6fb6ff;
}

.price-cell{
    font-weight:700;
}

.entry-cell{
    color:#ffd166;
}

.delete-cell{
    font-size:18px;
}

/* ======================================================
   SIGNAL ROW COLORS
====================================================== */

.row-buy{
    background:rgba(0,180,0,0.22)!important;
}

.row-sell{
    background:rgba(255,0,0,0.22)!important;
}

.row-prawie{
    background:rgba(255,215,0,0.22)!important;
}

.row-czekajdo{
    background:rgba(0,120,255,0.22)!important;
}

.row-czekaj{
    background:rgba(160,160,160,0.14)!important;
}

/* ======================================================
   TP COLORS
====================================================== */

.tp-hit{
    color:#00ff7f!important;
    font-weight:700;
}

.tp-close{
    color:#ffd700!important;
    font-weight:700;
}

.tp-fail{
    color:#ff4d4d!important;
    font-weight:700;
}

/* ======================================================
   POPUP
====================================================== */

.popup{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.78);
    backdrop-filter:blur(4px);
}

.popup-content{
    background:#121212;
    width:92%;
    max-width:520px;
    margin:40px auto;
    padding:22px;
    border-radius:16px;
    border:1px solid #222;
    box-shadow:0 0 30px #000;
    color:#eee;

    max-height:85vh;
    overflow-y:auto;
}

.popup-close{
    float:right;
    font-size:24px;
    cursor:pointer;
    opacity:0.75;
}

.popup-close:hover{
    opacity:1;
}

.popup-content h2{
    margin-top:0;
    margin-bottom:14px;
}

.popup-content pre{
    white-space:pre-wrap;
    font-family:inherit;
    font-size:14px;
    line-height:1.5;
    color:#d8d8d8;
}

/* ======================================================
   MOBILE
====================================================== */

@media (max-width:768px){

    body{
        padding:10px;
    }

    h1{
        font-size:18px;
    }

    button{
        width:100%;
    }

}

</style>
</head>

<body>

<h1>
VOICE XTB 7.4 PRO — M5 / M15 / H1
</h1>

<!-- ======================================================
     CONTROLS
====================================================== -->

<div id="controls">

    <button
        class="btn-start"
        onclick="startSequence()"
    >
        🎤 Start sekwencji pełnej
    </button>

    <button
        class="btn-stop"
        onclick="stopSequence()"
    >
        ⛔ Stop
    </button>

</div>

<!-- ======================================================
     STATUS
====================================================== -->

<div id="comment">
    Status systemu...
</div>

<div id="recognized">
    Rozpoznano: —
</div>

<div id="parsed">
    Bufor JSON: —
</div>

<!-- ======================================================
     TABLE
====================================================== -->

<div class="table-wrapper">

<table id="proTable">

<thead>

<tr>
    <th>Ticker</th>
    <th>Cena</th>
    <th>Interwał</th>
    <th>Entry</th>
    <th>Sygnał</th>
    <th>Widełki</th>
    <th>TP1</th>
    <th>TP2</th>
    <th>TP3</th>
    <th>🗑️</th>
</tr>

</thead>

<tbody id="table-body">

<tr>
<td colspan="10">
    Oczekiwanie na dane...
</td>
</tr>

</tbody>

</table>

</div>

<!-- ======================================================
     POPUP
====================================================== -->

<div
    id="popup"
    class="popup"
    role="dialog"
    aria-modal="true"
>

<div class="popup-content">

<span
    id="popupClose"
    class="popup-close"
    aria-label="Zamknij popup"
>
✖
</span>

<div id="popupBody"></div>

</div>
</div>

<!-- ======================================================
     VOICE ENGINE
====================================================== -->

<script defer src="js/voice.js"></script>

</body>
</html>

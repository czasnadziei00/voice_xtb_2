<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VOICE XTB 4.6 FINAL</title>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #222;
            color: #0f0;
            font-size: 26px;
        }

        #controls {
            text-align: center;
            padding: 15px;
            background: #1a1a1a;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #333;
            color: #eee;
            border: 1px solid #555;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        th {
            background: #222;
        }

        tr:hover {
            background: #1b1b1b;
        }

        .clickable-close {
            cursor: pointer;
            color: #0af;
            font-weight: bold;
        }

        /* SYGNAŁY FINAL */
        .signal-buy { background: #003300; color: #00ff00; }
        .signal-prawie-buy { background: #1a3300; color: #ccff33; }
        .signal-sell { background: #330000; color: #ff3333; }
        .signal-prawie-sell { background: #331a00; color: #ff9933; }
        .signal-reset { background: #222; color: #bbb; }
        .signal-czekaj { background: #001a33; color: #66ccff; }

        /* POPUP */
        #popup45 {
            display: none;
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: #222;
            border: 2px solid #555;
            padding: 20px;
            z-index: 9999;
            color: #eee;
        }

        #popupClose {
            float: right;
            cursor: pointer;
            color: #f33;
            font-size: 20px;
        }

        #parsed, #recognized, #comment {
            white-space: pre-wrap;
            padding: 10px;
            margin: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

<h1>VOICE XTB 4.6 FINAL — Jeden Wiersz</h1>

<div id="controls">
    <button onclick="startFullMic()">🎤 Start sekwencji pełnej</button>
    <button onclick="stopMic()">⛔ Stop</button>
</div>

<div id="comment">Status systemu...</div>
<div id="recognized">Rozpoznano: —</div>
<div id="parsed">Wysłane: —</div>

<table>
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Sygnał FINAL</th>
            <th>Close</th>
            <th>TP3</th>
            <th>Widełki</th>
            <th>📊</th>
            <th>🗑</th>
        </tr>
    </thead>
    <tbody id="voiceTableBody"></tbody>
</table>

<!-- POPUP -->
<div id="popup45">
    <span id="popupClose">✖</span>
    <h3>Analiza FINAL</h3>
    <pre id="popupData"></pre>
    <pre id="popupGeneral"></pre>
</div>

<script src="voice.js"></script>

</body>
</html>
